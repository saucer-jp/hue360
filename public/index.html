<!DOCTYPE HTML>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>[ HUE / 360 ] The Color Scheme Application</title>
  <meta name="viewport" content="width=1070" />
  <link rel="icon" href="/favicon/x32.png" sizes="32x32" type="image/png" />
  <link href='//fonts.googleapis.com/css?family=Oswald:300,400,700' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" href="/css/style.css" />
  <script type="text/javascript">
    var _gaq = _gaq || [];
    _gaq.push(['_setAccount', 'UA-35871570-1']);
    _gaq.push(['_trackPageview']);
    (function() {
      var ga = document.createElement('script'); ga.type = 'text/javascript'; ga.async = true;
      ga.src = ('https:' == document.location.protocol ? 'https://ssl' : 'http://www') + '.google-analytics.com/ga.js';
      var s = document.getElementsByTagName('script')[0]; s.parentNode.insertBefore(ga, s);
    })();
  </script>
</head>
<body>
  <div id="controller">
    <h1>Circle Controller</h1>
    <nav>
      <div class="circle-conf">
        <h2>Color Space</h2>
        <select id="colorSpace" data-setting="colorSpace">
          <option value="munsell" selected="selected">Munsell</option>
          <option value="rgb">RGB</option>
          <option value="rgb+">RGB+</option>
        </select>
      </div>
      <div class="circle-conf">
        <h2>Hue Step <span class="range-value">(<span data-setting-value="hueStep">20</span>)</span></h2>
        <label class="range-control" for="hueStep">
          <input id="hueStep" type="range" min="10" max="100" step="1" value="20" data-setting="hueStep">
        </label>
      </div>
      <div class="circle-conf">
        <h2>Chroma Step <span class="range-value">(<span data-setting-value="chromaStep">7</span>)</span></h2>
        <label class="range-control" for="chromaStep">
          <input id="chromaStep" type="range" min="3" max="10" step="1" value="7" data-setting="chromaStep">
        </label>
      </div>
      <div class="circle-conf">
        <h2>M&S Judge</h2>
        <select id="judge" data-setting="judgeEnabled">
          <option value="true" selected="selected">ON</option>
          <option value="false">OFF</option>
        </select>
      </div>
      <div class="circle-conf">
        <h2>Change background-color = shift + color chip click</h2>
      </div>
    </nav>
  </div>
  <div id="userColor"></div>
  <div id="colorCircle">
    <ul id="brightness">
      <li class="chip chip1 white-chip current-brightness" data-brightness="0"></li>
      <li class="chip chip2" data-brightness="1"></li>
      <li class="chip chip3" data-brightness="2"></li>
      <li class="chip chip4" data-brightness="3"></li>
      <li class="chip chip5" data-brightness="4"></li>
      <li class="chip chip6" data-brightness="5"></li>
      <li class="chip chip7" data-brightness="6"></li>
      <li class="chip chip8" data-brightness="7"></li>
      <li class="chip chip9" data-brightness="8"></li>
      <li class="chip chip10" data-brightness="9"></li>
    </ul>
  </div>
  <div id="print"></div>
  <span id="title">HUE/360</span>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
